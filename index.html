<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Command Center — Miyagi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070a0f;
  --bg2: #0d1117;
  --bg3: #131920;
  --border: #1e2a36;
  --border2: #253040;
  --text: #c8d8e8;
  --text-muted: #5a7a95;
  --text-dim: #3a5570;
  --lucid: #00d4aa;
  --lucid-dim: #00402e;
  --blusky: #4da6ff;
  --blusky-dim: #0a2040;
  --apex: #ff8c42;
  --apex-dim: #3a1800;
  --alpha: #ff4488;
  --alpha-dim: #3a0020;
  --win: #00d4aa;
  --loss: #ff4060;
  --neutral: #5a7a95;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
}

.logo span {
  color: var(--lucid);
}

.session-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  border: 1px solid var(--border2);
  padding: 3px 10px;
  border-radius: 2px;
  letter-spacing: 0.08em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.total-pnl-header {
  text-align: right;
}

.total-pnl-header .label {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.total-pnl-header .value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--win);
}

.date-display {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
}

/* MAIN */
.main {
  padding: 24px 32px;
  max-width: 1400px;
  margin: 0 auto;
}

/* SECTION HEADERS */
.section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 14px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ACCOUNT CARDS GRID */
.accounts-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

@media (max-width: 1200px) { .accounts-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) { .accounts-grid { grid-template-columns: 1fr; } }

.account-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}

.account-card:hover { border-color: var(--border2); }

.account-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.account-card.lucid::before { background: var(--lucid); }
.account-card.blusky::before { background: var(--blusky); }
.account-card.apex::before { background: var(--apex); }
.account-card.alpha::before { background: var(--alpha); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.card-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.card-name.lucid { color: var(--lucid); }
.card-name.blusky { color: var(--blusky); }
.card-name.apex { color: var(--apex); }
.card-name.alpha { color: var(--alpha); }

.card-type {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 0.12em;
  padding: 2px 8px;
  border-radius: 2px;
  text-transform: uppercase;
}

.type-funded { background: rgba(0,212,170,0.12); color: var(--lucid); border: 1px solid rgba(0,212,170,0.3); }
.type-eval { background: rgba(77,166,255,0.08); color: var(--text-muted); border: 1px solid var(--border2); }

.balance-display {
  margin-bottom: 16px;
}

.balance-label {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.balance-value {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.balance-delta {
  font-family: var(--mono);
  font-size: 11px;
  margin-top: 4px;
}

.delta-pos { color: var(--win); }
.delta-neg { color: var(--loss); }

/* DD BAR */
.dd-section {
  margin-bottom: 12px;
}

.dd-label-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.dd-label {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.dd-value {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
}

.dd-ok { color: var(--win); }
.dd-warn { color: #ffb830; }
.dd-danger { color: var(--loss); }

.dd-bar-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.dd-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}

.fill-ok { background: var(--win); }
.fill-warn { background: #ffb830; }
.fill-danger { background: var(--loss); }

/* CARD STATS */
.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.stat-item {
  text-align: center;
}

.stat-label {
  font-size: 9px;
  color: var(--text-dim);
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
}

/* WITHDRAWAL TARGET (Lucid only) */
.withdrawal-section {
  margin-top: 12px;
  padding: 10px;
  background: rgba(0,212,170,0.05);
  border: 1px solid rgba(0,212,170,0.15);
  border-radius: 3px;
}

.withdrawal-label {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.withdrawal-progress {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.withdrawal-current { font-family: var(--mono); font-size: 12px; color: var(--lucid); font-weight: 700; }
.withdrawal-target { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

.withdrawal-bar-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.withdrawal-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--lucid), #00ffcc);
  border-radius: 2px;
}

.withdrawal-remaining {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--text-dim);
  margin-top: 5px;
  text-align: right;
}

/* ANALYTICS ROW */
.analytics-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 14px;
}

@media (max-width: 1000px) { .analytics-grid { grid-template-columns: 1fr 1fr; } }

/* EQUITY CHART */
.chart-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}

.chart-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.equity-chart-area {
  height: 160px;
  position: relative;
}

svg.equity-svg {
  width: 100%;
  height: 100%;
}

/* RULES PANEL */
.rules-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}

.rule-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.rule-item:last-child { border-bottom: none; }

.rule-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
  background: var(--lucid);
}

.rule-dot.warn { background: #ffb830; }
.rule-dot.neutral { background: var(--text-dim); }

.rule-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
}

.rule-text strong {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--lucid);
}

/* TRADE LOG TABLE */
.table-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.table-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.table-filter-tabs {
  display: flex;
  gap: 4px;
}

.filter-tab {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  text-transform: uppercase;
}

.filter-tab:hover, .filter-tab.active {
  background: var(--border2);
  color: var(--text);
  border-color: var(--border2);
}

table.trade-table {
  width: 100%;
  border-collapse: collapse;
}

table.trade-table th {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 10px 20px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

table.trade-table td {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  padding: 11px 20px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

table.trade-table tr:last-child td { border-bottom: none; }

table.trade-table tr:hover td { background: rgba(255,255,255,0.02); }

.td-account {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
  font-weight: 700;
}

.acc-lucid { background: var(--lucid-dim); color: var(--lucid); border: 1px solid rgba(0,212,170,0.2); }
.acc-blusky { background: var(--blusky-dim); color: var(--blusky); border: 1px solid rgba(77,166,255,0.2); }
.acc-apex { background: var(--apex-dim); color: var(--apex); border: 1px solid rgba(255,140,66,0.2); }
.acc-alpha { background: var(--alpha-dim); color: var(--alpha); border: 1px solid rgba(255,68,136,0.2); }

.pnl-win { color: var(--win); font-weight: 700; }
.pnl-loss { color: var(--loss); font-weight: 700; }
.pnl-neutral { color: var(--neutral); }

.side-long { color: var(--win); font-size: 10px; padding: 2px 8px; background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.15); border-radius: 2px; }
.side-short { color: #ff8060; font-size: 10px; padding: 2px 8px; background: rgba(255,64,96,0.08); border: 1px solid rgba(255,64,96,0.15); border-radius: 2px; }

.exit-win { color: var(--win); font-size: 10px; }
.exit-loss { color: var(--loss); font-size: 10px; }

/* SEQUENCE SECTION */
.sequence-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}

.sequence-meta {
  display: flex;
  gap: 24px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.seq-stat {
  text-align: center;
}

.seq-stat-label {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.seq-stat-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
}

.sequence-timeline {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}

.seq-node {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.seq-node:hover .seq-tooltip { opacity: 1; pointer-events: auto; }

.seq-dot {
  width: 32px;
  height: 32px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  transition: transform 0.15s;
  border: 1px solid transparent;
}

.seq-node:hover .seq-dot { transform: scale(1.1); }

.seq-dot.win { background: rgba(0,212,170,0.18); color: var(--win); border-color: rgba(0,212,170,0.35); }
.seq-dot.loss { background: rgba(255,64,96,0.15); color: var(--loss); border-color: rgba(255,64,96,0.3); }
.seq-dot.be { background: rgba(90,122,149,0.15); color: var(--text-muted); border-color: var(--border2); }

.seq-dot-acc {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}

.seq-connector {
  width: 8px;
  height: 1px;
  background: var(--border);
  margin-top: -18px;
  flex-shrink: 0;
}

.seq-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 8px 10px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 50;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  line-height: 1.6;
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 2px;
  margin-left: 16px;
}

.streak-win { background: rgba(0,212,170,0.1); color: var(--win); border: 1px solid rgba(0,212,170,0.25); }
.streak-loss { background: rgba(255,64,96,0.1); color: var(--loss); border: 1px solid rgba(255,64,96,0.25); }
.streak-none { background: rgba(90,122,149,0.1); color: var(--text-muted); border: 1px solid var(--border); }

/* DAY HEATMAP */
.heatmap-grid {
  display: grid;
  gap: 6px;
}

.heatmap-row {
  display: grid;
  grid-template-columns: 70px repeat(auto-fill, 36px);
  gap: 4px;
  align-items: center;
}

.heatmap-acc-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: right;
  padding-right: 6px;
}

.heatmap-cell {
  width: 36px;
  height: 28px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  border: 1px solid transparent;
  cursor: default;
}

.heatmap-cell.win { background: rgba(0,212,170,0.18); color: var(--win); border-color: rgba(0,212,170,0.25); }
.heatmap-cell.loss { background: rgba(255,64,96,0.12); color: var(--loss); border-color: rgba(255,64,96,0.2); }
.heatmap-cell.be { background: rgba(90,122,149,0.1); color: var(--text-muted); border-color: var(--border); }
.heatmap-cell.empty { background: var(--bg3); color: var(--text-dim); border-color: var(--border); font-size:8px; }

.heatmap-date-row {
  display: grid;
  grid-template-columns: 70px repeat(auto-fill, 36px);
  gap: 4px;
  margin-bottom: 8px;
}

.heatmap-date-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  text-align: center;
}

/* RISK MONITOR */
.risk-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.risk-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
}

.risk-card-label {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.risk-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}

.risk-row:last-child { border-bottom: none; }

.risk-acc {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

.risk-val {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
}

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

@media (max-width: 900px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }

.stat-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  text-align: center;
}

.stat-box .s-label {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.stat-box .s-value {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.stat-box .s-sub {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-dim);
  margin-top: 4px;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* HIDDEN for filtering */
.trade-row { transition: opacity 0.2s; }
.trade-row.hidden { display: none; }

/* CIRCUIT BREAKER */
.circuit-breaker {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.cb-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.cb-status {
  display: flex;
  gap: 24px;
}

.cb-item {
  text-align: center;
}

.cb-item-label {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 3px;
}

.cb-item-value {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
}

.cb-ok { color: var(--win); }
.cb-warn { color: #ffb830; }
.cb-stop { color: var(--loss); }

.cb-rule {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
}

.cb-rule strong {
  color: #ffb830;
  font-weight: 700;
}

/* ═══════════════════════════════════════════════
   ANIMATIONS & EFFECTS
═══════════════════════════════════════════════ */

/* Page load — scanline flash */
@keyframes scanline {
  0%   { transform: translateY(-100%); opacity: 0.06; }
  100% { transform: translateY(100vh); opacity: 0; }
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, transparent, rgba(0,212,170,0.04), transparent);
  pointer-events: none;
  animation: scanline 1.8s ease-out forwards;
  z-index: 9999;
}

/* Fade-in stagger for cards */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.account-card {
  animation: fadeUp 0.5s ease both;
}
.account-card:nth-child(1) { animation-delay: 0.05s; }
.account-card:nth-child(2) { animation-delay: 0.12s; }
.account-card:nth-child(3) { animation-delay: 0.19s; }
.account-card:nth-child(4) { animation-delay: 0.26s; }

.stat-box {
  animation: fadeUp 0.5s ease both;
}
.stat-box:nth-child(1) { animation-delay: 0.1s; }
.stat-box:nth-child(2) { animation-delay: 0.15s; }
.stat-box:nth-child(3) { animation-delay: 0.2s; }
.stat-box:nth-child(4) { animation-delay: 0.25s; }
.stat-box:nth-child(5) { animation-delay: 0.3s; }

.chart-card, .rules-card, .table-card,
.sequence-wrap, .risk-card {
  animation: fadeUp 0.6s ease both;
  animation-delay: 0.35s;
}

/* Card hover — glow per account color */
.account-card.lucid:hover  { border-color: rgba(0,212,170,0.5); box-shadow: 0 0 18px rgba(0,212,170,0.08); }
.account-card.blusky:hover { border-color: rgba(77,166,255,0.5); box-shadow: 0 0 18px rgba(77,166,255,0.08); }
.account-card.apex:hover   { border-color: rgba(255,140,66,0.5); box-shadow: 0 0 18px rgba(255,140,66,0.08); }
.account-card.alpha:hover  { border-color: rgba(255,68,136,0.5); box-shadow: 0 0 18px rgba(255,68,136,0.08); }
.account-card { transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s; }
.account-card:hover { transform: translateY(-2px); }

/* Top bar shimmer on hover */
.account-card::before {
  transition: opacity 0.3s;
  opacity: 0.7;
}
.account-card:hover::before { opacity: 1; }

/* Circuit breaker — pulse when STOP */
@keyframes pulse-stop {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
.cb-stop { animation: pulse-stop 1.2s ease-in-out infinite; }

/* Circuit breaker — blink border when STOP */
@keyframes border-alert {
  0%, 100% { border-color: var(--border); }
  50%       { border-color: rgba(255,64,96,0.4); }
}
.circuit-breaker.is-stop {
  animation: border-alert 1.4s ease-in-out infinite;
}

/* DD bar — smooth fill on load (overrides inline) */
.dd-bar-fill, .withdrawal-bar-fill {
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

/* Heatmap cells — stagger fade in */
@keyframes cellIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}
.heatmap-cell {
  animation: cellIn 0.35s ease both;
  transition: transform 0.15s, box-shadow 0.15s;
}
.heatmap-cell:hover {
  transform: scale(1.08);
  box-shadow: 0 0 8px rgba(255,255,255,0.06);
  z-index: 2;
  position: relative;
}

/* Sequence nodes — stagger */
@keyframes nodeIn {
  from { opacity: 0; transform: scale(0.6); }
  to   { opacity: 1; transform: scale(1); }
}
.seq-node { animation: nodeIn 0.3s ease both; }

/* Header total P&L — subtle glow */
.total-pnl-header .value {
  text-shadow: 0 0 20px rgba(0,212,170,0.25);
  transition: text-shadow 0.3s;
}
.total-pnl-header .value:hover {
  text-shadow: 0 0 30px rgba(0,212,170,0.5);
}

/* Session badge — breathing border */
@keyframes breathe {
  0%, 100% { border-color: var(--border2); }
  50%       { border-color: rgba(0,212,170,0.35); }
}
.session-badge {
  animation: breathe 3s ease-in-out infinite;
}

/* Table rows — hover highlight */
table.trade-table tr:hover td {
  background: rgba(255,255,255,0.025);
  transition: background 0.15s;
}

/* Section titles — fade in left */
@keyframes titleIn {
  from { opacity: 0; letter-spacing: 0.35em; }
  to   { opacity: 1; letter-spacing: 0.2em; }
}
.section-title {
  animation: titleIn 0.7s ease both;
  animation-delay: 0.1s;
}

/* Filter tabs */
.filter-tab {
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

/* Withdrawal bar — glow */
.withdrawal-bar-fill {
  box-shadow: 0 0 8px rgba(0,212,170,0.3);
}

/* Scrollbar glow */
::-webkit-scrollbar-thumb:hover { background: rgba(0,212,170,0.3); }

const ACC_COLOR = { lucid:'#00d4aa', blusky:'#4da6ff', apex:'#ff8c42', alpha:'#ff4488' };
const ACC_LABEL = { lucid:'LUCID', blusky:'BLUSKY', apex:'APEX', alpha:'ALPHA' };

// Date order — dd/mm/aa format for display
const DATE_ORDER = ['3/12/26','3/13/26','3/16/26','3/17/26','3/18/26','3/19/26','3/20/26','3/23/26','3/24/26','3/25/26'];

function fmtDate(d) {
  // Convert m/d/yy → dd/mm/20yy
  const parts = d.split('/');
  const dd = parts[1].padStart(2,'0');
  const mm = parts[0].padStart(2,'0');
  const yy = '20' + parts[2];
  return `${dd}/${mm}/${yy}`;
}

const sorted = [...TRADES].sort((a,b) => DATE_ORDER.indexOf(a.date) - DATE_ORDER.indexOf(b.date));

// Build sequence timeline
function buildSequence() {
  const timeline = document.getElementById('sequence-timeline');
  timeline.innerHTML = '';

  let maxWin = 0, maxLoss = 0, curStreak = 0, curType = null;
  let runWin = 0, runLoss = 0;

  sorted.forEach((t, i) => {
    const result = t.pnl > 0 ? 'win' : t.pnl < 0 ? 'loss' : 'be';
    const symbol = result === 'win' ? 'W' : result === 'loss' ? 'L' : 'BE';
    const pnlStr = (t.pnl >= 0 ? '+' : '') + '$' + Math.abs(t.pnl).toFixed(0);

    // streak calc
    if (result === 'win') { runWin++; runLoss = 0; maxWin = Math.max(maxWin, runWin); }
    else if (result === 'loss') { runLoss++; runWin = 0; maxLoss = Math.max(maxLoss, runLoss); }
    else { runWin = 0; runLoss = 0; }

    const node = document.createElement('div');
    node.className = 'seq-node';
    node.innerHTML = `
      <div class="seq-dot ${result}">
        ${symbol}
      </div>
      <div class="seq-dot-acc" style="background:${ACC_COLOR[t.acc]}"></div>
      <div class="seq-tooltip">
        <div style="color:${ACC_COLOR[t.acc]};font-weight:700;margin-bottom:2px;">${ACC_LABEL[t.acc]} · ${fmtDate(t.date)}</div>
        <div>${t.side === 'B' ? 'LONG' : 'SHORT'} ${t.c}c</div>
        <div>In: ${t.entry.toFixed(2)} → Out: ${t.exit.toFixed(2)}</div>
        <div style="color:${t.pnl >= 0 ? '#00d4aa' : '#ff4060'};font-weight:700;margin-top:2px;">${pnlStr} · ${t.via}</div>
      </div>
    `;

    timeline.appendChild(node);

    if (i < sorted.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'seq-connector';
      timeline.appendChild(conn);
    }
  });

  // Current streak
  const last = sorted[sorted.length - 1];
  let streak = 0, streakType = '';
  for (let i = sorted.length - 1; i >= 0; i--) {
    const r = sorted[i].pnl > 0 ? 'win' : sorted[i].pnl < 0 ? 'loss' : 'be';
    const lastR = sorted[sorted.length-1].pnl > 0 ? 'win' : sorted[sorted.length-1].pnl < 0 ? 'loss' : 'be';
    if (r === lastR) { streak++; streakType = lastR; }
    else break;
  }

  const streakBadge = document.getElementById('streak-badge');
  const streakVal = document.getElementById('current-streak-val');
  if (streakType === 'win') {
    streakBadge.className = 'streak-badge streak-win';
    streakBadge.textContent = `🔥 Racha activa: ${streak} win${streak>1?'s':''}`;
    streakVal.style.color = 'var(--win)';
    streakVal.textContent = `W${streak}`;
  } else if (streakType === 'loss') {
    streakBadge.className = 'streak-badge streak-loss';
    streakBadge.textContent = `❌ Racha: ${streak} pérdida${streak>1?'s':''}`;
    streakVal.style.color = 'var(--loss)';
    streakVal.textContent = `L${streak}`;
  } else {
    streakBadge.className = 'streak-badge streak-none';
    streakBadge.textContent = `○ Último: BE`;
    streakVal.textContent = 'BE';
  }
}

buildSequence();

function filterTrades(filter, btn) {
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.trade-row').forEach(row => {
    const acc = row.dataset.account;
    const res = row.dataset.result;
    let show = false;
    if (filter === 'all') show = true;
    else if (filter === 'win') show = res === 'win';
    else if (filter === 'loss') show = res === 'loss';
    else show = acc === filter;
    row.classList.toggle('hidden', !show);
  });
}

// ─── ANIMATE BARS ─────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Animate DD and withdrawal bars
  document.querySelectorAll('.dd-bar-fill, .withdrawal-bar-fill').forEach(bar => {
    const target = bar.style.width;
    bar.style.width = '0%';
    setTimeout(() => { bar.style.width = target; }, 400);
  });

  // Counter animation for balance values
  function animateCounter(el, target, prefix = '', suffix = '', duration = 1200) {
    const start = 0;
    const startTime = performance.now();
    const isNeg = target < 0;
    const abs = Math.abs(target);
    function tick(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      const current = abs * ease;
      const formatted = current.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      el.textContent = prefix + (isNeg ? '-' : '') + '$' + formatted + suffix;
      if (progress < 1) requestAnimationFrame(tick);
      else el.textContent = prefix + (isNeg ? '-' : '') + '$' + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + suffix;
    }
    requestAnimationFrame(tick);
  }

  // Animate balance values
  setTimeout(() => {
    const balanceMap = [
      { sel: '.account-card.lucid .balance-value',  val: 50590.00 },
      { sel: '.account-card.blusky .balance-value', val: 50946.00 },

    balanceMap.forEach(({ sel, val }) => {
      const el = document.querySelector(sel);
      if (el) animateCounter(el, val, '', '', 1400);
    });
  }, 300);

    if (el) {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.4s';

  // Circuit breaker — add is-stop class if status is STOP
  const statusEl = document.getElementById('cb-status');

    cell.style.animationDelay = `${0.02 * i}s`;

  // Stagger sequence nodes
  document.querySelectorAll('.seq-node').forEach((node, i) => {

    node.style.opacity = '0';
    node.style.animation = `nodeIn 0.3s ease ${0.03 * i + 0.4}s both`;
  });

  // Seq connectors fade

    c.style.opacity = '0';
    setTimeout(() => {
      c.style.transition = 'opacity 0.2s';
      c.style.opacity = '1';
    }, (i * 30) + 600);
  });
});
